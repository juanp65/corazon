<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR · Órganos 3D</title>

  <!-- model-viewer -->
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0a86c9;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto;
    }
    body {
      display: flex;
      flex-direction: column;
    }

    /* ---------- HEADER / TABS ---------- */
    header {
      background: #0e3e4f;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 14px;
    }
    .title { font-weight: 600; }

    .tabs {
      display: flex;
      gap: 6px;
    }
    .tab {
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.35);
      padding: 5px 12px;
      background: rgba(255,255,255,.04);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
    }
    .tab.active {
      background: #e63946;
      border-color: #e63946;
    }

    /* ---------- LAYOUT PRINCIPAL ---------- */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 8px 4px;
    }

    model-viewer {
      display: block;
      width: min(96vw, 1000px);
      height: min(80vh, 620px);
      background: #000;
      border-radius: 14px;
      margin: 0 auto;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      text-align: center;
      max-width: 900px;
    }

    /* ---------- HOTSPOTS ---------- */
    .hotspot{
      --dot-size: 12px;
      --panel-bg: rgba(0,0,0,.80);
      --panel-width: 210px;

      background: none;
      border: none;
      position: relative;
      transform: translate(-50%, -50%);
      cursor: pointer;
      outline: none;
    }
    .hotspot[hidden]{
      display: none;
    }

    .dot{
      width: var(--dot-size);
      height: var(--dot-size);
      border-radius: 50%;
      background: #e6142d;
      border: 2px solid #fff;
      box-shadow: 0 0 6px rgba(0,0,0,.6);
      margin: 0 auto;
    }

    .label{
      margin-top: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(0,0,0,.78);
      color: #fff;
      font-size: 11px;
      white-space: nowrap;
    }

    .panel{
      position: absolute;
      left: 50%;
      top: 120%;
      transform: translateX(-50%);
      width: var(--panel-width);
      background: var(--panel-bg);
      color: #fff;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 11px;
      line-height: 1.35;
      text-align: left;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }

    .hotspot.open .panel{
      opacity: 1;
      pointer-events: auto;
    }

    .panel::before{
      content: "";
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 0 6px 6px 6px;
      border-style: solid;
      border-color: transparent transparent var(--panel-bg) transparent;
    }

    @media (max-width:600px){
      .panel{ width:190px; font-size:10px; }
      .label{ font-size:10px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="title">AR · Órganos 3D</div>
    <div class="tabs">
      <button class="tab active" data-organ-btn="heart">Corazón</button>
      <button class="tab" data-organ-btn="brain">Cerebro</button>
      <button class="tab" data-organ-btn="liver">Hígado</button>
    </div>
  </header>

  <main>
    <model-viewer id="mv"
      src="assets/realistic_human_heart.glb"
      alt="Órgano 3D"
      camera-controls
      auto-rotate
      ar
      ar-modes="webxr scene-viewer quick-look"
      exposure="1"
      shadow-intensity="1">

      <!-- ========== CORAZÓN ========== -->
      <button class="hotspot"
        slot="hotspot-heart-atrium-right"
        data-organ="heart"
        data-position="-0.45 0.45 0.25"
        data-normal="0 1 0">
        <div class="dot"></div>
        <div class="label">Aurícula der.</div>
        <div class="panel">
          Recibe la sangre pobre en oxígeno que llega desde todo el cuerpo
          a través de las venas cavas.
        </div>
      </button>

      <button class="hotspot"
        slot="hotspot-heart-atrium-left"
        data-organ="heart"
        data-position="0.45 0.45 0.25"
        data-normal="0 1 0">
        <div class="dot"></div>
        <div class="label">Aurícula izq.</div>
        <div class="panel">
          Recibe la sangre oxigenada que proviene de los pulmones mediante
          las venas pulmonares.
        </div>
      </button>

      <button class="hotspot"
        slot="hotspot-heart-ventricle-right"
        data-organ="heart"
        data-position="-0.35 -0.15 0.45"
        data-normal="0 1 0">
        <div class="dot"></div>
        <div class="label">Ventrículo der.</div>
        <div class="panel">
          Envía la sangre hacia los pulmones por la arteria pulmonar para que
          pueda oxigenarse.
        </div>
      </button>

      <button class="hotspot"
        slot="hotspot-heart-ventricle-left"
        data-organ="heart"
        data-position="0.35 -0.10 0.45"
        data-normal="0 1 0">
        <div class="dot"></div>
        <div class="label">Ventrículo izq.</div>
        <div class="panel">
          Es la cavidad más potente del corazón; bombea sangre oxigenada a
          la aorta y al resto del cuerpo.
        </div>
      </button>

      <!-- ========== CEREBRO ========== -->
      <button class="hotspot"
        slot="hotspot-brain-frontal"
        data-organ="brain"
        data-position="0 0.25 0.35"
        data-normal="0 1 0">
        <div class="dot"></div>
        <div class="label">Lóbulo frontal</div>
        <div class="panel">
          Participa en la planificación, la toma de decisiones, el control de
          movimientos voluntarios y la regulación de la conducta.
        </div>
      </button>

      <button class="hotspot"
        slot="hotspot-brain-temporal"
        data-organ="brain"
        data-position="0.28 0.05 0.40"
        data-normal="0 1 0">
        <div class="dot"></div>
        <div class="label">Lóbulo temporal</div>
        <div class="panel">
          Relacionado con la audición, la memoria y la comprensión del
          lenguaje.
        </div>
      </button>

      <button class="hotspot"
        slot="hotspot-brain-occipital"
        data-organ="brain"
        data-position="-0.28 0.05 0.35"
        data-normal="0 1 0">
        <div class="dot"></div>
        <div class="label">Lóbulo occipital</div>
        <div class="panel">
          Zona principal de procesamiento de la información visual.
        </div>
      </button>

      <!-- ========== HÍGADO (hotspots muy separados) ========== -->

      <!-- Lóbulo derecho (derecha y abajo) -->
      <button class="hotspot"
        slot="hotspot-liver-right-lobe"
        data-organ="liver"
        data-position="0.45 -0.10 0.30"
        data-normal="0 1 0">
        <div class="dot"></div>
        <div class="label">Lóbulo derecho</div>
        <div class="panel">
          Es la porción más grande del hígado. Participa en la filtración de
          la sangre y en el metabolismo de nutrientes y fármacos.
        </div>
      </button>

      <!-- Lóbulo izquierdo (izquierda y un poco más arriba) -->
      <button class="hotspot"
        slot="hotspot-liver-left-lobe"
        data-organ="liver"
        data-position="-0.45 0.05 0.30"
        data-normal="0 1 0">
        <div class="dot"></div>
        <div class="label">Lóbulo izquierdo</div>
        <div class="panel">
          Lóbulo más pequeño, situado hacia la izquierda del abdomen. También
          participa en la desintoxicación y el procesamiento de nutrientes.
        </div>
      </button>

      <!-- Vasos hepáticos (centro, arriba) -->
      <button class="hotspot"
        slot="hotspot-liver-vessels"
        data-organ="liver"
        data-position="0 0.25 0.20"
        data-normal="0 1 0">
        <div class="dot"></div>
        <div class="label">Vasos hepáticos</div>
        <div class="panel">
          Incluyen la vena porta y la arteria hepática, que llevan al hígado
          sangre rica en nutrientes y oxígeno para su procesamiento.
        </div>
      </button>

    </model-viewer>

    <p class="hint">
      Usa los botones del encabezado para cambiar entre <b>corazón</b>,
      <b>cerebro</b> y <b>hígado</b>. Toca cada punto para ver una breve
      descripción.
    </p>
  </main>

  <script>
    const mv = document.getElementById('mv');
    const tabs = document.querySelectorAll('[data-organ-btn]');
    const hotspots = Array.from(document.querySelectorAll('.hotspot'));

    const MODELS = {
      heart : 'assets/realistic_human_heart.glb',
      brain : 'assets/human_brain.glb',
      liver : 'assets/human_liver.glb'
    };

    const EXPOSURE = {
      heart : 1.0,
      brain : 0.9,
      liver : 1.0
    };

    function setOrgan(organ){
      mv.src = MODELS[organ];
      if (EXPOSURE[organ] !== undefined) {
        mv.setAttribute('exposure', String(EXPOSURE[organ]));
      }

      tabs.forEach(btn =>
        btn.classList.toggle('active', btn.dataset.organBtn === organ)
      );

      hotspots.forEach(h => {
        h.hidden = (h.dataset.organ !== organ);
        h.classList.remove('open');
      });
    }

    tabs.forEach(btn => {
      btn.addEventListener('click', () => setOrgan(btn.dataset.organBtn));
    });

    hotspots.forEach(h => {
      h.addEventListener('click', e => {
        e.stopPropagation();
        const open = h.classList.contains('open');
        hotspots.forEach(x => x.classList.remove('open'));
        if (!open) h.classList.add('open');
      });
    });

    document.addEventListener('click', () => {
      hotspots.forEach(x => x.classList.remove('open'));
    });

    // Órgano por defecto
    setOrgan('heart');
  </script>
</body>
</html>
